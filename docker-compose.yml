services:
  postgres:
    image: postgres:17-alpine
    container_name: inquisitor-postgres
    environment:
      POSTGRES_DB: inquisitor
      POSTGRES_USER: inquisitor
      POSTGRES_PASSWORD: inquisitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inquisitor -d inquisitor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
